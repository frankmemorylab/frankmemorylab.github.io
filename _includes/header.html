<header class="site-header">
  <div class="container">
    <a href="{{ site.github.url }}/" class="site-logo">
      <img src="{{ site.github.url }}/assets/img/logo-mark.svg" alt="{{ site.title }}">
      <div class="site-logo-text">
        <span class="site-logo-name">{{ site.title }}</span>
      </div>
    </a>
    <nav class="site-nav">
      <a href="{{ site.github.url }}/research"{% if page.url contains 'research' %} class="active"{% endif %}>Research</a>
      <a href="{{ site.github.url }}/people"{% if page.url contains 'people' %} class="active"{% endif %}>Team</a>
      <a href="{{ site.github.url }}/news"{% if page.url contains 'news' %} class="active"{% endif %}>News &amp; Updates</a>
      <a href="{{ site.github.url }}/publications"{% if page.url contains 'publications' %} class="active"{% endif %}>Publications</a>
      <a href="{{ site.github.url }}/contact"{% if page.url contains 'contact' %} class="active"{% endif %}>Contact</a>
    </nav>
  </div>
</header>
